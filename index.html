<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CD4 雲端請假紀錄中央後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-indigo-50/40 min-h-screen py-10 px-4 antialiased">
  
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl shadow-slate-200/50 overflow-hidden mb-8 mt-6 border border-slate-100">
    <div class="p-6 bg-white border-b border-slate-100 text-center space-y-4">
      <h1 class="text-xl font-bold text-slate-800 flex items-center justify-center gap-2">
        📋 CD4 雲端請假紀錄中央後台
      </h1>
      <button onclick="fetchDates()" id="refreshBtn" class="bg-indigo-600 text-white text-xs font-bold py-2.5 px-5 rounded-xl hover:bg-indigo-700 transition-all shadow-md shadow-indigo-600/10 flex items-center justify-center gap-1.5 mx-auto">
        🔄 重新整理雲端數據
      </button>
    </div>

    <div class="p-6 space-y-6">
      <div class="space-y-4">
        <h2 class="font-bold text-slate-700 text-sm tracking-wide flex items-center gap-1.5">
          📅 管理訓練日期
        </h2>
        
        <div class="space-y-3">
          <input type="date" id="trainingDate" class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-slate-800 font-medium shadow-sm">
          <input type="text" id="trainingTime" value="15:00-18:00" placeholder="例如：15:00-18:00" class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-slate-800 font-medium shadow-sm">
          <button onclick="addDate()" id="addBtn" class="w-full bg-slate-800 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-slate-900 transition-all shadow-sm text-sm">
            ➕ 新增日期
          </button>
        </div>
      </div>

      <hr class="border-slate-100">

      <div class="space-y-3">
        <div class="grid grid-cols-3 text-xs font-bold text-slate-400 pb-1 px-1">
          <span>已設定日期</span>
          <span class="text-center">時間</span>
          <span class="text-right">操作</span>
        </div>
        
        <div id="datesList" class="space-y-2 max-h-80 overflow-y-auto pr-1">
          <p class="text-xs text-slate-400 italic text-center py-4">正在讀取雲端日子...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 你的 Google Apps Script 網址
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2pbjpqpWN0StsLa-1r8vIgs5CHmkfunzJTNfl4iOb_0YPETYXFgmxMzRmKuXWgHQXQ/exec';

    // 抓取雲端日期
    async function fetchDates() {
      const refreshBtn = document.getElementById('refreshBtn');
      const datesList = document.getElementById('datesList');
      
      refreshBtn.disabled = true;
      refreshBtn.innerText = '⚡ 正在同步...';
      
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDates`);
        const dates = await response.json();
        
        datesList.innerHTML = '';
        if (!dates || dates.length === 0) {
          datesList.innerHTML = '<p class="text-xs text-slate-400 italic text-center py-4">尚未設定任何訓練日期</p>';
          return;
        }
        
        // 排序：新日子排前頭
        dates.sort((a, b) => b.date.localeCompare(a.date));
        
        dates.forEach(d => {
          const row = document.createElement('div');
          row.className = "grid grid-cols-3 items-center text-sm font-medium text-slate-700 p-2.5 bg-slate-50 rounded-lg border border-slate-200/50 animate-fade-in";
          row.innerHTML = `
            <span class="font-mono font-bold text-xs text-slate-800">${d.date}</span>
            <span class="text-xs text-slate-500 text-center">${d.time || '15:00-18:00'}</span>
            <div class="text-right">
              <button onclick="deleteDate('${d.date}')" class="text-xs bg-rose-50 text-rose-600 font-bold px-2 py-1 rounded hover:bg-rose-100 transition-all border border-rose-100">刪除</button>
            </div>
          `;
          datesList.appendChild(row);
        });
      } catch (e) {
        alert('連線失敗，請確保 Google Apps Script 已成功發佈並設定「所有人」皆可存取。');
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.innerText = '🔄 重新整理雲端數據';
      }
    }

    // 新增日期邏輯
    async function addDate() {
      const dateInput = document.getElementById('trainingDate');
      const timeInput = document.getElementById('trainingTime');
      const addBtn = document.getElementById('addBtn');
      
      if (!dateInput.value) {
        alert('請先選擇日期！');
        return;
      }
      
      addBtn.disabled = true;
      addBtn.innerText = '儲存中...';
      
      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'addDate',
            date: dateInput.value,
            time: timeInput.value
          })
        });
        
        // 背景異步射入需要少許緩衝，1秒後刷新列表
        setTimeout(() => {
          dateInput.value = '';
          fetchDates();
          addBtn.disabled = false;
          addBtn.innerText = '➕ 新增日期';
        }, 1000);
      } catch(e) {
        alert('新增失敗，請重試');
        addBtn.disabled = false;
        addBtn.innerText = '➕ 新增日期';
      }
    }

    // 刪除日期邏輯
    async function deleteDate(dateStr) {
      if (!confirm(`確定要刪除 ${dateStr} 嘅訓練日子同埋對應嘅請假分頁嗎？\n(注意：此操作不可復原)`)) return;
      
      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'deleteDate',
            date: dateStr
          })
        });
        
        setTimeout(() => {
          fetchDates();
        }, 1000);
      } catch(e) {
        alert('刪除失敗');
      }
    }

    // 網頁開啟自動載入
    window.addEventListener('DOMContentLoaded', fetchDates);
  </script>
</body>
</html>
