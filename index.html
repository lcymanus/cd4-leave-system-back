<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CD4 雲端請假紀錄中央後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-indigo-50/40 min-h-screen py-10 px-4 antialiased">
  
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl shadow-slate-200/50 overflow-hidden mb-8 mt-6 border border-slate-100">
    <div class="p-6 bg-white border-b border-slate-100 text-center space-y-4">
      <h1 class="text-xl font-bold text-slate-800 flex items-center justify-center gap-2">
        CD4 請假紀錄中央後台
      </h1>
      <button onclick="fetchDates()" id="refreshBtn" class="bg-indigo-600 text-white text-xs font-bold py-2.5 px-5 rounded-xl hover:bg-indigo-700 transition-all shadow-md shadow-indigo-600/10 flex items-center justify-center mx-auto">
        重新整理雲端數據
      </button>
    </div>

    <div class="p-6 space-y-8">
      <div class="space-y-4">
        <h2 class="font-bold text-slate-700 text-sm tracking-wide flex items-center gap-1.5 border-l-4 border-indigo-500 pl-2">
          查閱請假名單
        </h2>
        
        <div>
          <select id="viewMonthSelect" class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none bg-white transition-all text-slate-800 font-bold shadow-sm cursor-pointer mb-3">
            <option value="" disabled selected>載入月份中...</option>
          </select>
        </div>

        <div id="viewDaysContainer" class="grid grid-cols-2 gap-2 hidden"></div>

        <div id="leaveRecordsContainer" class="hidden mt-4 p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-4">
          <h3 id="leaveRecordsTitle" class="text-sm font-bold text-slate-800 pb-2 border-b border-slate-200 text-center"></h3>
          
          <div>
            <h4 class="text-xs font-bold text-indigo-700 bg-indigo-100/50 py-1.5 px-2.5 rounded-md mb-2">
              隊長請假名單
            </h4>
            <div id="leaderList" class="space-y-2"></div>
          </div>

          <div>
            <h4 class="text-xs font-bold text-teal-700 bg-teal-50 py-1.5 px-2.5 rounded-md mb-2 mt-4">
              隊員請假名單
            </h4>
            <div id="memberList" class="space-y-2"></div>
          </div>
        </div>
      </div>

      <hr class="border-slate-100">

      <div class="space-y-4">
        <h2 class="font-bold text-slate-700 text-sm tracking-wide flex items-center gap-1.5 border-l-4 border-slate-800 pl-2">
          管理訓練日期 (新增/刪除)
        </h2>
        
        <div class="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
          <input type="date" id="trainingDate" class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-slate-800 font-medium shadow-sm">
          <input type="text" id="trainingTime" value="15:00-18:00" placeholder="例如：15:00-18:00" class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-slate-800 font-medium shadow-sm">
          <button onclick="addDate()" id="addBtn" class="w-full bg-slate-800 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-slate-900 transition-all shadow-sm text-sm">
            新增日期
          </button>
        </div>

        <div id="datesList" class="space-y-2 max-h-40 overflow-y-auto pr-1 mt-3">
          <p class="text-xs text-slate-400 italic text-center py-4">正在讀取雲端數據...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2pbjpqpWN0StsLaF-1r8vIgs5CHmkfunzJTNfl4iOb_0YPETYXFgmxMzRmKuXWgHQXQ/exec';
    let globalDates = [];

    async function fetchDates() {
      const refreshBtn = document.getElementById('refreshBtn');
      const datesList = document.getElementById('datesList');
      const viewMonthSelect = document.getElementById('viewMonthSelect');
      
      refreshBtn.disabled = true; 
      refreshBtn.innerText = '正在同步數據...';
      
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDates`);
        globalDates = await response.json();
        
        datesList.innerHTML = '';
        if (!globalDates || globalDates.length === 0) {
          datesList.innerHTML = '<p class="text-xs text-slate-400 italic text-center py-4">尚未設定任何訓練日期</p>';
          viewMonthSelect.innerHTML = '<option disabled selected>無數據</option>';
          return;
        }
        
        globalDates.sort((a, b) => b.date.localeCompare(a.date)); 
        
        globalDates.forEach(d => {
          const row = document.createElement('div');
          row.className = "flex justify-between items-center text-sm p-2 bg-white rounded border border-slate-200/50";
          row.innerHTML = `
            <span class="font-mono font-bold text-xs text-slate-800">${d.date}</span>
            <button onclick="deleteDate('${d.date}')" class="text-xs text-rose-500 font-bold px-2 py-1 rounded hover:bg-rose-50 transition-all">刪除</button>
          `;
          datesList.appendChild(row);
        });

        const months = [...new Set(globalDates.map(d => d.date.substring(0, 7)))].sort().reverse();
        viewMonthSelect.innerHTML = '<option value="" disabled selected>-- 請選擇月份 --</option>';
        months.forEach(m => {
          const option = document.createElement('option');
          option.value = m;
          const parts = m.split('-');
          option.textContent = `${parts[0]}年 ${parts[1]}月`;
          viewMonthSelect.appendChild(option);
        });

      } catch (e) {
        alert('連線失敗，請檢查網路連線或權限設定。');
      } finally {
        refreshBtn.disabled = false; 
        refreshBtn.innerText = '重新整理雲端數據';
      }
    }

    document.getElementById('viewMonthSelect').addEventListener('change', function() {
      const selectedMonth = this.value;
      const filteredDates = globalDates.filter(d => d.date.startsWith(selectedMonth)).sort((a,b) => a.date.localeCompare(b.date));
      
      const daysContainer = document.getElementById('viewDaysContainer');
      const recordsContainer = document.getElementById('leaveRecordsContainer');
      
      daysContainer.innerHTML = '';
      daysContainer.classList.remove('hidden');
      recordsContainer.classList.add('hidden'); 

      filteredDates.forEach(d => {
        const btn = document.createElement('button');
        btn.className = "bg-indigo-50 text-indigo-700 border border-indigo-100 font-bold py-2 rounded-lg text-sm hover:bg-indigo-600 hover:text-white transition-all active:scale-95";
        btn.innerText = d.date.substring(5); 
        btn.onclick = () => fetchLeaveList(d.date);
        daysContainer.appendChild(btn);
      });
    });

    async function fetchLeaveList(targetDate) {
      const recordsContainer = document.getElementById('leaveRecordsContainer');
      const recordsTitle = document.getElementById('leaveRecordsTitle');
      const leaderList = document.getElementById('leaderList');
      const memberList = document.getElementById('memberList');
      
      recordsContainer.classList.remove('hidden');
      recordsTitle.innerText = `正在檢索 ${targetDate} 的紀錄...`;
      leaderList.innerHTML = '';
      memberList.innerHTML = '';

      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLeaves`);
        const allLeaves = await response.json();
        
        const dayLeaves = allLeaves.filter(record => record.date.includes(targetDate));
        recordsTitle.innerText = `${targetDate} 請假人員名單`;
        
        const leaders = dayLeaves.filter(r => r.role === 'leader');
        const members = dayLeaves.filter(r => r.role !== 'leader');

        if (leaders.length === 0) {
          leaderList.innerHTML = '<p class="text-xs text-slate-400 italic py-1 px-1">當日無隊長請假紀錄。</p>';
        } else {
          leaders.forEach(record => leaderList.appendChild(createRecordItem(record)));
        }

        if (members.length === 0) {
          memberList.innerHTML = '<p class="text-xs text-slate-400 italic py-1 px-1">當日無隊員請假紀錄。</p>';
        } else {
          members.forEach(record => memberList.appendChild(createRecordItem(record)));
        }

      } catch (e) {
        recordsTitle.innerText = `讀取失敗，請重新整理頁面。`;
      }
    }

    function createRecordItem(record) {
      const item = document.createElement('div');
      item.className = "flex justify-between items-center p-2.5 bg-white rounded-lg shadow-sm border border-slate-100 text-sm";
      item.innerHTML = `
        <div>
          <span class="font-bold text-slate-800 block">${record.name} <span class="text-xs text-slate-400 font-normal">(${record.subUnit})</span></span>
          <span class="text-xs text-slate-500 font-mono">${record.number}</span>
        </div>
        <div class="text-right">
          <span class="text-xs font-bold text-rose-600 bg-rose-50 px-2 py-1 rounded-md border border-rose-100">${record.reason}</span>
        </div>
      `;
      return item;
    }

    async function addDate() {
      const dateInput = document.getElementById('trainingDate');
      const timeInput = document.getElementById('trainingTime');
      const addBtn = document.getElementById('addBtn');
      if (!dateInput.value) { alert('請選擇有效日期。'); return; }
      addBtn.disabled = true; addBtn.innerText = '處理中...';
      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'addDate', date: dateInput.value, time: timeInput.value })
        });
        setTimeout(() => { dateInput.value = ''; fetchDates(); addBtn.disabled = false; addBtn.innerText = '新增日期'; }, 1000);
      } catch(e) { alert('新增失敗'); addBtn.disabled = false; addBtn.innerText = '新增日期'; }
    }

    async function deleteDate(dateStr) {
      if (!confirm(`確定要刪除 ${dateStr} 的訓練日期？`)) return;
      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'deleteDate', date: dateStr })
        });
        setTimeout(() => { fetchDates(); document.getElementById('leaveRecordsContainer').classList.add('hidden'); }, 1000);
      } catch(e) { alert('刪除失敗'); }
    }

    window.addEventListener('DOMContentLoaded', fetchDates);
  </script>
</body>
</html>
