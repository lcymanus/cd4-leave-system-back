<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CD4 恆常訓練日期管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] min-h-screen py-4 px-3 antialiased text-slate-900 flex flex-col justify-center relative">
  
  <div id="authScreen" class="max-w-md w-full mx-auto space-y-2 animate-[fadeIn_0.3s_ease-out]">
    
    <div class="bg-slate-900 rounded-t-xl px-4 py-5 text-center relative overflow-hidden border-b-2 border-amber-500">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-500 via-slate-500 to-amber-500"></div>
      <h1 class="text-xl font-black text-white tracking-widest uppercase">CD4 恆常訓練日期管理</h1>
      <div class="mt-1.5 h-px w-12 bg-amber-500 mx-auto"></div>
      <p class="text-[9px] mt-1.5 text-slate-400 font-bold tracking-widest uppercase whitespace-nowrap overflow-hidden text-ellipsis">SYSTEM ADMINISTRATION</p>
    </div>

    <div class="bg-white rounded-b-xl shadow-xl border-x border-b border-slate-200 overflow-hidden p-5 space-y-5">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-[9px] font-black text-amber-700 bg-amber-50 px-1.5 py-0.5 rounded">SECURE</span>
        <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase">管理員登入</span>
      </div>
      
      <div>
        <label class="block font-bold text-slate-600 mb-1 text-[10px] tracking-widest uppercase">請輸入管理密碼</label>
        <input type="password" id="adminPassword" placeholder="••••" class="w-full p-3 bg-slate-50 border border-slate-200 rounded text-center tracking-[0.5em] text-lg font-mono focus:outline-none focus:border-slate-800 transition-all">
        <p id="errorMsg" class="text-[10px] text-rose-500 font-bold mt-1.5 hidden animate-pulse">密碼錯誤，請重新輸入</p>
      </div>
      
      <button onclick="checkPassword()" class="w-full mt-2 bg-amber-600 text-white font-black py-3 px-4 rounded shadow-lg hover:bg-amber-700 active:scale-[0.99] transition-all text-[11px] tracking-[0.2em] uppercase">
        確認登入系統
      </button>
    </div>

    <div class="text-center pt-2 pb-1">
      <p class="text-[9px] text-slate-500 font-black tracking-widest uppercase">System Crafted by CD41 E5902</p>
      <p class="text-[8px] text-[#94a3b8] italic mt-0.5 font-semibold tracking-wider">"To Learn, To Grow, To Explore, To Serve"</p>
    </div>
  </div>

  <div id="appContent" class="max-w-md w-full mx-auto space-y-2 hidden animate-[fadeIn_0.3s_ease-out]">
    
    <div class="flex justify-between items-center mb-1">
      <a href="https://www.cascd4lrf.online" class="inline-flex items-center gap-1 text-[10px] font-black text-slate-400 hover:text-slate-900 tracking-widest uppercase transition-colors">
        <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"></path>
        </svg>
        返回前台表格
      </a>
      
      <button onclick="location.reload()" class="inline-flex items-center gap-1 text-[10px] font-black text-slate-400 hover:text-rose-600 tracking-widest uppercase transition-colors">
        安全登出
        <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"></path>
        </svg>
      </button>
    </div>

    <div class="bg-slate-900 rounded-t-xl px-4 py-5 text-center relative overflow-hidden border-b-2 border-amber-500">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-500 via-slate-500 to-amber-500"></div>
      <h1 class="text-xl font-black text-white tracking-widest uppercase">CD4 恆常訓練日期管理</h1>
      <div class="mt-1.5 h-px w-12 bg-amber-500 mx-auto"></div>
      <p class="text-[9px] mt-1.5 text-slate-400 font-bold tracking-widest uppercase whitespace-nowrap overflow-hidden text-ellipsis">SYSTEM ADMINISTRATION</p>
    </div>

    <div class="bg-white rounded-b-xl shadow-xl border-x border-b border-slate-200 overflow-hidden">
      <div class="p-5 space-y-5">
        
        <div class="space-y-3">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2">
              <span class="text-[9px] font-black text-amber-700 bg-amber-50 px-1.5 py-0.5 rounded">PART I</span>
              <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase">新增日期</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block font-bold text-slate-600 mb-1 text-[10px] tracking-widest uppercase">1. 訓練日期</label>
              <input type="date" id="trainingDate" class="w-full p-2.5 bg-white border border-slate-200 rounded focus:outline-none focus:border-slate-800 focus:ring-0 text-sm font-bold transition-all">
            </div>
            <div>
              <label class="block font-bold text-slate-600 mb-1 text-[10px] tracking-widest uppercase">2. 訓練時間</label>
              <input type="text" id="trainingTime" value="15:00-18:00" placeholder="例: 15:00-18:00" class="w-full p-2.5 bg-white border border-slate-200 rounded focus:outline-none focus:border-slate-800 focus:ring-0 text-sm font-bold transition-all">
            </div>
          </div>
          <button onclick="addDate()" id="addBtn" class="w-full mt-1 bg-slate-800 text-white font-black py-2.5 px-4 rounded shadow hover:bg-slate-900 active:scale-[0.99] transition-all text-[11px] tracking-[0.2em] uppercase">
            新增排期
          </button>
        </div>

        <div class="h-px bg-slate-100"></div>

        <div class="space-y-3">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2">
              <span class="text-[9px] font-black text-amber-700 bg-amber-50 px-1.5 py-0.5 rounded">PART II</span>
              <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase">現有雲端數據</span>
            </div>
            <button onclick="fetchDates()" id="refreshBtn" class="text-[9px] font-black text-slate-500 bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded transition-colors flex items-center gap-1 uppercase tracking-wider">
              重新整理
            </button>
          </div>

          <div id="datesList" class="space-y-2 max-h-48 overflow-y-auto pr-1">
            <p class="text-[10px] text-slate-400 font-bold text-center py-4 border border-dashed border-slate-200 rounded">請稍候，正在讀取...</p>
          </div>
        </div>

      </div>
    </div>
    
    <div class="text-center pt-2 pb-1">
      <p class="text-[9px] text-slate-500 font-black tracking-widest uppercase">System Crafted by CD41 E5902</p>
      <p class="text-[8px] text-[#94a3b8] italic mt-0.5 font-semibold tracking-wider">"To Learn, To Grow, To Explore, To Serve"</p>
    </div>

  </div>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 自訂滾動條樣式 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2pbjpqpWN0StsLaF-1r8vIgs5CHmkfunzJTNfl4iOb_0YPETYXFgmxMzRmKuXWgHQXQ/exec';
    let globalDates = [];

    // --- 密碼驗證邏輯 ---
    function checkPassword() {
      const pwdInput = document.getElementById('adminPassword');
      const errorMsg = document.getElementById('errorMsg');
      
      if (pwdInput.value === '1968') {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appContent').classList.remove('hidden');
        fetchDates();
      } else {
        errorMsg.classList.remove('hidden');
        pwdInput.value = '';
        pwdInput.focus();
      }
    }

    document.getElementById('adminPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
    // --------------------

    async function fetchDates() {
      const refreshBtn = document.getElementById('refreshBtn');
      const datesList = document.getElementById('datesList');
      
      refreshBtn.disabled = true; 
      refreshBtn.innerText = '同步中...';
      
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDates`);
        globalDates = await response.json();
        
        datesList.innerHTML = '';
        if (!globalDates || globalDates.length === 0) {
          datesList.innerHTML = '<p class="text-[10px] text-slate-400 font-bold text-center py-4 border border-dashed border-slate-200 rounded">系統暫無任何訓練日期</p>';
          return;
        }
        
        // 日期由新至舊排列
        globalDates.sort((a, b) => b.date.localeCompare(a.date)); 
        
        globalDates.forEach(d => {
          const row = document.createElement('div');
          row.className = "flex justify-between items-center p-2.5 bg-slate-50 rounded border border-slate-200 hover:border-amber-300 transition-colors";
          row.innerHTML = `
            <span class="font-bold text-[11px] text-slate-800 tracking-wide">${d.date} <span class="text-slate-500 font-normal">(${d.time})</span></span>
            <button onclick="deleteDate('${d.date}')" class="text-[10px] text-white bg-rose-600 font-black tracking-widest px-2.5 py-1.5 rounded hover:bg-rose-700 active:scale-[0.95] transition-all">刪除</button>
          `;
          datesList.appendChild(row);
        });

      } catch (e) {
        alert('連線失敗，請檢查網路連線或權限設定。');
      } finally {
        refreshBtn.disabled = false; 
        refreshBtn.innerText = '重新整理';
      }
    }

    async function addDate() {
      const dateInput = document.getElementById('trainingDate');
      const timeInput = document.getElementById('trainingTime');
      const addBtn = document.getElementById('addBtn');
      if (!dateInput.value) { alert('請選擇有效日期。'); return; }
      addBtn.disabled = true; addBtn.innerText = '處理中...';
      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'addDate', date: dateInput.value, time: timeInput.value })
        });
        setTimeout(() => { dateInput.value = ''; fetchDates(); addBtn.disabled = false; addBtn.innerText = '新增排期'; }, 1000);
      } catch(e) { alert('新增失敗'); addBtn.disabled = false; addBtn.innerText = '新增排期'; }
    }

    async function deleteDate(dateStr) {
      if (!confirm(`確定要刪除 ${dateStr} 的訓練日期？\n(注意：此操作將影響所有前台表格)`)) return;
      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'deleteDate', date: dateStr })
        });
        setTimeout(() => { fetchDates(); }, 1000);
      } catch(e) { alert('刪除失敗'); }
    }
  </script>
</body>
</html>
